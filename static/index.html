<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Chatbot</title>
<style>
  :root {
    --bg: #14161a;
    --panel: #1c1f26;
    --border: #2a2e37;
    --text: #e7e9ee;
    --muted: #8b909c;
    --accent: #6fb3a8;
    --accent-dim: #3f6f68;
    --user-bubble: #2a3038;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  header .dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
  }
  header h1 {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.02em;
    margin: 0;
    color: var(--text);
  }
  header span {
    font-size: 12px;
    color: var(--muted);
    margin-left: auto;
  }
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
  }
  .msg {
    max-width: 78%;
    padding: 11px 15px;
    border-radius: 14px;
    line-height: 1.5;
    font-size: 14.5px;
    white-space: pre-wrap;
  }
  .msg.user {
    align-self: flex-end;
    background: var(--user-bubble);
    border-bottom-right-radius: 4px;
  }
  .msg.bot {
    align-self: flex-start;
    background: var(--panel);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }
  .msg.bot.pending { color: var(--muted); font-style: italic; }
  .sources {
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
  }
  form {
    display: flex;
    gap: 10px;
    padding: 16px 24px 22px;
    border-top: 1px solid var(--border);
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
  }
  input {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 14.5px;
    outline: none;
  }
  input:focus { border-color: var(--accent-dim); }
  button {
    background: var(--accent);
    color: #0e1512;
    border: none;
    padding: 0 20px;
    border-radius: 10px;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
  }
  button:disabled { opacity: 0.5; cursor: default; }
  .empty {
    color: var(--muted);
    font-size: 13.5px;
    text-align: center;
    margin-top: 40px;
  }
</style>
</head>
<body>
  <header>
    <div class="dot"></div>
    <h1>Memory Chatbot</h1>
    <span id="status">connecting…</span>
  </header>

  <div id="chat">
    <div class="empty" id="empty-state">Ask something — this bot remembers you across visits and can pull answers from its knowledge base.</div>
  </div>

  <form id="form">
    <input id="input" type="text" placeholder="Type a message…" autocomplete="off" />
    <button id="send" type="submit">Send</button>
  </form>

<script>
  const chatEl = document.getElementById('chat');
  const formEl = document.getElementById('form');
  const inputEl = document.getElementById('input');
  const sendEl = document.getElementById('send');
  const statusEl = document.getElementById('status');
  const emptyEl = document.getElementById('empty-state');

  // A stable per-browser user id so memory persists across visits.
  let userId = localStorage.getItem('chatbot_user_id');
  if (!userId) {
    userId = 'user_' + Math.random().toString(36).slice(2, 10);
    localStorage.setItem('chatbot_user_id', userId);
  }

  fetch('/health').then(r => r.json()).then(d => {
    statusEl.textContent = d.status === 'ok' ? 'ready' : 'starting…';
  }).catch(() => { statusEl.textContent = 'offline'; });

  function addMessage(text, role) {
    if (emptyEl) emptyEl.remove();
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    div.textContent = text;
    chatEl.appendChild(div);
    chatEl.scrollTop = chatEl.scrollHeight;
    return div;
  }

  formEl.addEventListener('submit', async (e) => {
    e.preventDefault();
    const message = inputEl.value.trim();
    if (!message) return;

    addMessage(message, 'user');
    inputEl.value = '';
    sendEl.disabled = true;

    const pending = addMessage('thinking…', 'bot pending');

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user_id: userId, message })
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        pending.textContent = 'Error: ' + (err.detail || res.status);
        pending.classList.remove('pending');
        return;
      }
      const data = await res.json();
      pending.textContent = data.reply;
      pending.classList.remove('pending');
      const meta = [];
      if (data.route) meta.push('route: ' + data.route);
      if (data.sources_used && data.sources_used.length) meta.push('source: ' + data.sources_used.join(', '));
      if (meta.length) {
        const src = document.createElement('div');
        src.className = 'sources';
        src.textContent = meta.join(' · ');
        pending.appendChild(src);
      }
    } catch (err) {
      pending.textContent = 'Connection error — is the server running?';
      pending.classList.remove('pending');
    } finally {
      sendEl.disabled = false;
      inputEl.focus();
    }
  });
</script>
</body>
</html>
