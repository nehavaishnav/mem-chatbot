services:
  - type: web
    name: memory-chatbot
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python ingest.py && python build_graph.py"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3.5-flash
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: memory_chatbot
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USER
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: RAG_DOCS_DIR
        value: data/sample_docs
